name: Run py-micp

on:
 push:
   branches:
     - main
 pull_request:
   
jobs:
  run-py-micp-local:
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 10        
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:26.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            python3 python3-pip python3-venv \
            build-essential git curl ca-certificates \
            software-properties-common \
            octave \
            mpi-default-bin

          ln -s /usr/bin/python3 /usr/bin/python || true
          
      - name: Install python requirements
        run: |
          python3 -m venv vpy-micp
          . vpy-micp/bin/activate
          echo "$PWD/vpy-micp/bin" >> $GITHUB_PATH
          pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install -r dev-requirements.txt
          
      - name: Check code style 
        run: |
          black --target-version py312 ./
          pylint ./ --ignore-paths="vpy-micp/","MRST","test_outputs"
          ruff check ./
      
      - name: Download MRST
        run: |
          git clone https://github.com/SINTEF-AppliedCompSci/MRST.git
          cd MRST
          git checkout 2026a
      
      - name: Install Flow Simulator
        run: |
          apt-get update
          apt-add-repository ppa:opm/ppa
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y libopm-simulators-bin
        
      - name: Run the tests
        run: |
          pytest --basetemp=test_outputs --exitfirst tests/ --mrst_startup "$GITHUB_WORKSPACE/MRST/startup.m"
